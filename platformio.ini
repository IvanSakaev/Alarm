[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps = 
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	gyverlibs/GyverButton@^3.8
	gyverlibs/GyverEncoder@^4.10
	gyverlibs/GyverPower@^2.2.2
	adafruit/RTClib@^2.1.4
	gyverlibs/GTimer@^1.1.1
